<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyrox AI</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Nyrox</h2>

    <button onclick="setTool('ads')">📢 إعلان</button>
    <button onclick="setTool('ideas')">💡 أفكار</button>
    <button onclick="setTool('profit')">💰 أرباح</button>

  </div>

  <!-- Main -->
  <div class="main">

    <div id="chat" class="chat"></div>

    <div class="input-area">
      <input id="input" placeholder="اكتب هنا..." />
      <button onclick="send()">➤</button>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
